<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ログイン | Deen不動産</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.4rem;
      font-weight: 700;
      color: #16365c;
      letter-spacing: 0.05em;
    }
    .login-sub {
      text-align: center;
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #16365c;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.95rem;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #b79869; }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #16365c;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #b79869; }
    .error-msg {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">Deen不動産</div>
    <div class="login-sub">管理者ログイン</div>
    <div class="error-msg" id="error-msg"></div>
    <div>
      <label>メールアドレス</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email">
      <label>パスワード</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <button class="btn-login" id="login-btn">ログイン</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mapmlunyowklihchrwik.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1hcG1sdW55b3drbGloY2hyd2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTYwMjMsImV4cCI6MjA5MTkzMjAyM30.F9M4GHCp4Fv4s_T8LOYjfJlrGdvd26V9YQZT025BClg';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // すでにログイン済みならダッシュボードへ
    sb.auth.getSession().then(({ data }) => {
      if (data.session) location.href = 'dashboard.html';
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'メールアドレスとパスワードを入力してください。';
        errEl.style.display = 'block';
        return;
      }

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = 'メールアドレスまたはパスワードが正しくありません。';
        errEl.style.display = 'block';
      } else {
        location.href = 'dashboard.html';
      }
    });

    // Enterキーでログイン
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
  </script>
</body>
</html>
